services:
  db:
    image: postgres:16-alpine
    container_name: promptcraft-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promptcraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptcraft"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: promptcraft-backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: promptcraft-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  auth:
    build:
      context: ./auth
    container_name: promptcraft-auth
    env_file:
      - ./auth/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./auth:/app
      - auth_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
  auth_node_modules:
