services:
  db:
    image: postgres:16-alpine
    container_name: promptcraft-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promptcraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d promptcraft"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: promptcraft-backend
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    # Override the prod CMD from the Dockerfile: enable --reload for dev,
    # skip alembic (run manually with `docker compose exec backend poetry run alembic upgrade head`).
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: promptcraft-frontend
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  auth:
    build:
      context: ./auth
    container_name: promptcraft-auth
    env_file:
      - ./auth/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NODE_ENV: development
    volumes:
      - ./auth:/app
      - auth_node_modules:/app/node_modules
    # Override the prod CMD: run next dev against the bind-mounted source.
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  postgres_data:
  frontend_node_modules:
  auth_node_modules:
