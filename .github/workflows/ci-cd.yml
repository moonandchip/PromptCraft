name: CI-CD

on:
  pull_request:
  push:

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      auth: ${{ steps.filter.outputs.auth }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            auth:
              - 'auth/**'

  backend-tests:
    name: Backend Tests
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          pip install poetry==2.3.2
          poetry install --with dev --no-root --no-interaction --no-ansi
        working-directory: backend

      - name: Run backend tests
        run: poetry run pytest tests -q
        working-directory: backend

  frontend-tests:
    name: Frontend Tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test
        working-directory: frontend

  auth-build:
    name: Auth Build
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: auth/package-lock.json

      - name: Install auth dependencies
        run: npm ci
        working-directory: auth

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: auth

      - name: Build auth service
        run: npm run build
        working-directory: auth

  publish-images:
    name: Publish Docker Images
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.auth == 'true'
      ) &&
      (needs.backend-tests.result == 'success' || needs.backend-tests.result == 'skipped') &&
      (needs.frontend-tests.result == 'success' || needs.frontend-tests.result == 'skipped') &&
      (needs.auth-build.result == 'success' || needs.auth-build.result == 'skipped')
    needs:
      - changes
      - backend-tests
      - frontend-tests
      - auth-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image names
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "SHA_SHORT=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/backend:latest
            ghcr.io/${{ env.REPO_LC }}/backend:${{ env.SHA_SHORT }}

      - name: Build and push frontend image
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/frontend:latest
            ghcr.io/${{ env.REPO_LC }}/frontend:${{ env.SHA_SHORT }}

      - name: Build and push auth image
        if: needs.changes.outputs.auth == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./auth
          file: ./auth/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/auth:latest
            ghcr.io/${{ env.REPO_LC }}/auth:${{ env.SHA_SHORT }}

  deploy-prod:
    name: Deploy to Production
    needs:
      - changes
      - publish-images
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.publish-images.result == 'success' &&
      (
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.auth == 'true'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Trigger docker compose pull + up on EC2 via SSM
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=promptcraft-prod-app" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          if [ -z "$INSTANCE_ID" ]; then
            echo "::error::No running EC2 with tag Name=promptcraft-prod-app. Has the infra workflow applied yet?"
            exit 1
          fi
          echo "Targeting instance $INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --instance-ids "$INSTANCE_ID" \
            --parameters '{"commands":["set -e","cd /etc/promptcraft","docker compose pull","docker compose up -d --remove-orphans","docker compose ps"],"executionTimeout":["600"]}' \
            --query 'Command.CommandId' --output text)
          echo "Sent SSM command $CMD_ID — waiting..."

          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          echo "::group::SSM command output"
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json
          echo "::endgroup::"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'Status' --output text)
          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command finished with status $STATUS"
            exit 1
          fi

      - name: Post-deploy health check
        env:
          HEALTH_URL: ${{ vars.PROD_HEALTH_URL }}
        run: |
          set -euo pipefail
          if [ -z "${HEALTH_URL:-}" ]; then
            echo "::warning::PROD_HEALTH_URL repo variable is not set; skipping probe."
            exit 0
          fi
          echo "Probing $HEALTH_URL ..."
          for i in 1 2 3 4 5 6; do
            if curl --fail --silent --show-error --max-time 5 "$HEALTH_URL" > /tmp/health.out; then
              echo "Health check passed on attempt $i:"
              cat /tmp/health.out
              exit 0
            fi
            echo "Attempt $i failed; retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 6 attempts"
          exit 1
