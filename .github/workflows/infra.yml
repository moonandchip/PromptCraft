name: Infra (Terraform)

on:
  pull_request:
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra.yml'
  push:
    branches: [main]
    paths:
      - 'infra/terraform/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "1"
  TF_INPUT: "0"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
        shell: bash

    env:
      # ----- Non-secret variables -----
      TF_VAR_aws_region:            ${{ vars.AWS_REGION }}
      TF_VAR_github_repository:     ${{ vars.TF_VAR_github_repository }}
      TF_VAR_ghcr_username:         ${{ vars.TF_VAR_ghcr_username }}
      TF_VAR_image_tag:             ${{ vars.TF_VAR_image_tag }}
      TF_VAR_domain_name:           ${{ vars.TF_VAR_domain_name }}
      TF_VAR_use_sslip:             ${{ vars.TF_VAR_use_sslip }}
      TF_VAR_acme_email:            ${{ vars.TF_VAR_acme_email }}
      TF_VAR_frontend_origin:       ${{ vars.TF_VAR_frontend_origin }}
      TF_VAR_prompt_feedback_model: ${{ vars.TF_VAR_prompt_feedback_model }}
      TF_VAR_route53_zone_id:       ${{ vars.TF_VAR_route53_zone_id }}

      # ----- Secrets -----
      TF_VAR_ghcr_token:       ${{ secrets.TF_VAR_ghcr_token }}
      TF_VAR_db_password:      ${{ secrets.TF_VAR_db_password }}
      TF_VAR_auth_secret:      ${{ secrets.TF_VAR_auth_secret }}
      TF_VAR_leonardo_api_key: ${{ secrets.TF_VAR_leonardo_api_key }}
      TF_VAR_openai_api_key:   ${{ secrets.TF_VAR_openai_api_key }}
      TF_VAR_ssh_public_key:   ${{ secrets.TF_VAR_ssh_public_key }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}"

      - name: Terraform validate
        run: terraform validate

      # ---------- PR: plan + comment ----------
      - name: Terraform plan (PR)
        if: github.event_name == 'pull_request'
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          terraform show -no-color tfplan > plan.txt
          set -e

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'infra/terraform/plan.txt';
            let plan = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '(plan failed)';
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + '\n\n... (truncated)';
            const body = [
              '### Terraform Plan',
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: github.event_name == 'pull_request' && steps.plan.outputs.exitcode != '0'
        run: exit 1

      # ---------- main: apply ----------
      - name: Terraform apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false

      - name: Show outputs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "::group::Terraform outputs"
          terraform output
          echo "::endgroup::"

      # ---------- Manual: plan only ----------
      - name: Terraform plan (manual)
        if: github.event_name == 'workflow_dispatch'
        run: terraform plan -no-color -input=false
